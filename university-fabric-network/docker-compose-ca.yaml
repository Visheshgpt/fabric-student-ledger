version: '2'

networks:
  fabric:

services:
  ca.orderer.university.com:
    image: hyperledger/fabric-ca:1.4.9
    container_name: ca.orderer.university.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
      - FABRIC_CA_SERVER_PORT=9054
    ports:
      - "9054:9054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./ca-server/orderer:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric

  ca.university.edu:
    image: hyperledger/fabric-ca:1.4.9
    container_name: ca.university.edu
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-university
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./ca-server/university:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric

  ca.department.university.edu:
    image: hyperledger/fabric-ca:1.4.9
    container_name: ca.department.university.edu
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-department
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - "8054:8054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ./ca-server/department:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric
