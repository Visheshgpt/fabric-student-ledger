version: '2'

volumes:
  orderer.university.com:
  peer0.university.edu:
  peer0.department.university.edu:

networks:
  fabric:

services:
  orderer.university.com:
    extends:
      file: base/peer-base.yaml
      service: orderer-base
    container_name: orderer.university.com
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/university.com/orderers/orderer.university.com/msp:/var/hyperledger/orderer/msp
      - orderer.university.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
    networks:
      - fabric

  peer0.university.edu:
    extends:
      file: base/peer-base.yaml
      service: peer-base
    container_name: peer0.university.edu
    environment:
      - CORE_PEER_ID=peer0.university.edu
      - CORE_PEER_ADDRESS=peer0.university.edu:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.university.edu:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.university.edu:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.university.edu:7051
      - CORE_PEER_LOCALMSPID=UniversityMSP
      - CORE_CHAINCODE_BUILDER=hyperledger/fabric-ccenv:2.2.0
      - CORE_CHAINCODE_GOLANG_RUNTIME=hyperledger/fabric-baseos:2.2.0
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/university.edu/peers/peer0.university.edu/msp:/etc/hyperledger/fabric/msp
      - peer0.university.edu:/var/hyperledger/production
    ports:
      - 7051:7051
    networks:
      - fabric

  peer0.department.university.edu:
    extends:
      file: base/peer-base.yaml
      service: peer-base
    container_name: peer0.department.university.edu
    environment:
      - CORE_PEER_ID=peer0.department.university.edu
      - CORE_PEER_ADDRESS=peer0.department.university.edu:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.department.university.edu:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.department.university.edu:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.department.university.edu:9051
      - CORE_PEER_LOCALMSPID=DepartmentMSP
      - CORE_CHAINCODE_BUILDER=hyperledger/fabric-ccenv:2.2.0
      - CORE_CHAINCODE_GOLANG_RUNTIME=hyperledger/fabric-baseos:2.2.0
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/department.university.edu/peers/peer0.department.university.edu/msp:/etc/hyperledger/fabric/msp
      - peer0.department.university.edu:/var/hyperledger/production
    ports:
      - 9051:9051
    networks:
      - fabric

  universitycli:
    container_name: universitycli
    image: hyperledger/fabric-tools:2.2.0
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.university.edu:7051
      - CORE_PEER_LOCALMSPID=UniversityMSP 
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/university.edu/users/Admin@university.edu/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./chaincode:/opt/gopath/src/github.com/chaincode
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ./scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
    depends_on:
      - orderer.university.com
      - peer0.university.edu
    networks:
      - fabric

  departmentcli:
    container_name: departmentcli
    image: hyperledger/fabric-tools:2.2.0
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.department.university.edu:9051
      - CORE_PEER_LOCALMSPID=DepartmentMSP 
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/department.university.edu/users/Admin@department.university.edu/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./chaincode:/opt/gopath/src/github.com/chaincode
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ./scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
    depends_on:
      - orderer.university.com
      - peer0.department.university.edu
    networks:
      - fabric
